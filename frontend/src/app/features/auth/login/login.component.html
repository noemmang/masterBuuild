<div class="auth-page">
    <div class="auth-card">
  
      <div class="auth-logo">
        <span class="logo-master">master</span><span class="logo-build">Build</span>
      </div>
  
      <h1 class="auth-title">Iniciar sesión</h1>
      <p class="auth-sub">Bienvenido de nuevo</p>
  
      <div class="field">
        <label for="email">Correo electrónico</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          placeholder="tu@email.com"
          autocomplete="email"
        />
      </div>
  
      <div class="field">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          placeholder="••••••••"
          autocomplete="current-password"
          (keyup.enter)="submit()"
        />
      </div>
  
      <div class="auth-error" *ngIf="error">{{ error }}</div>
  
      <button class="btn-primary" (click)="submit()" [disabled]="cargando">
        <span *ngIf="!cargando">Entrar</span>
        <span *ngIf="cargando" class="spinner"></span>
      </button>
  
      <p class="auth-link">
        ¿No tienes cuenta? <a routerLink="/auth/registro">Regístrate</a>
      </p>
  
    </div>
  </div>
