<div class="auth-page">
    <div class="auth-card">
  
      <div class="auth-logo">
        <span class="logo-master">master</span><span class="logo-build">Build</span>
      </div>
  
      <h1 class="auth-title">Crear cuenta</h1>
      <p class="auth-sub">Empieza a comparar y configurar</p>
  
      <div class="field">
        <label for="nombre">Nombre</label>
        <input id="nombre" type="text" [(ngModel)]="nombre" placeholder="Tu nombre" autocomplete="name" />
      </div>
  
      <div class="field">
        <label for="email">Correo electrónico</label>
        <input id="email" type="email" [(ngModel)]="email" placeholder="tu@email.com" autocomplete="email" />
      </div>
  
      <div class="field">
        <label for="password">Contraseña</label>
        <input id="password" type="password" [(ngModel)]="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password" />
      </div>
  
      <div class="field">
        <label for="confirm">Confirmar contraseña</label>
        <input
          id="confirm"
          type="password"
          [(ngModel)]="password_confirmation"
          placeholder="Repite la contraseña"
          autocomplete="new-password"
          (keyup.enter)="submit()"
        />
      </div>
  
      <div class="auth-error" *ngIf="error">{{ error }}</div>
  
      <button class="btn-primary" (click)="submit()" [disabled]="cargando">
        <span *ngIf="!cargando">Crear cuenta</span>
        <span *ngIf="cargando" class="spinner"></span>
      </button>
  
      <p class="auth-link">
        ¿Ya tienes cuenta? <a routerLink="/auth/login">Inicia sesión</a>
      </p>
  
    </div>
  </div>
