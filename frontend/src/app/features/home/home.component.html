<div class="home">

    <!-- Hero -->
    <section class="hero">
      <h1 class="hero-title">
        Encuentra el mejor precio<br>
        para tu <span class="accent">hardware</span>
      </h1>
      <p class="hero-sub">Compara precios de miles de componentes PC en las principales tiendas</p>
      <div class="search-bar">
        <span class="search-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </span>
        <input type="text" placeholder="Busca un componente, modelo o marca..." />
        <button class="search-btn" routerLink="/buscar">Buscar</button>
      </div>
    </section>
  
    <!-- Categorías -->
    <section class="categorias">
      <div class="categorias-inner">
        @for (cat of categorias; track cat.slug) {
          <a class="cat-pill" [routerLink]="['/buscar']" [queryParams]="{ categoria: cat.slug }">
            <span>{{ cat.nombre }}</span>
          </a>
        }
      </div>
    </section>
  
    <!-- Grid destacados (placeholder) -->
    <section class="destacados">
      <div class="section-header">
        <h2>Componentes destacados</h2>
        <a routerLink="/buscar" class="ver-todos">Ver todos →</a>
      </div>
      <div class="cards-grid">
        @for (item of [1,2,3,4,5,6]; track item) {
          <div class="card-skeleton"></div>
        }
      </div>
    </section>
  
  </div>
